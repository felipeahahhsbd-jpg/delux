<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: linear-gradient(180deg, #1a0505 0%, #000000 100%);
            --card: rgba(255, 255, 255, 0.05);
            --green: #2ecc71;
            --gold: #FFD700;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg); 
            color: white; 
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .header a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            width: 40px;
            height: 40px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .deposit-card {
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 14px;
            padding-left: 5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--gold);
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .btn-gerar {
            width: 100%;
            background: var(--gold);
            color: black;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-gerar:disabled { opacity: 0.5; cursor: not-allowed; }

        #qr-container {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            display: inline-block;
        }

        #qr-img { width: 200px; height: 200px; }

        .pix-box {
            background: rgba(255, 215, 0, 0.1);
            border: 1px dashed var(--gold);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            word-break: break-all;
            font-size: 12px;
            color: var(--gold);
        }

        .btn-copy {
            background: var(--gold);
            color: black;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-top: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html"><i class="fas fa-chevron-left"></i></a>
        <h2>Depósito PIX</h2>
    </div>

    <div class="deposit-card" id="deposito-screen">
        <div class="input-group">
            <label>Valor do Depósito</label>
            <div class="input-wrapper">
                <i class="fas fa-wallet"></i>
                <input type="number" id="deposito-valor" placeholder="0.00">
            </div>
        </div>

        <div class="input-group">
            <label>Seu CPF (Apenas números)</label>
            <div class="input-wrapper">
                <i class="fas fa-id-card"></i>
                <input type="text" id="deposito-cpf" placeholder="000.000.000-00">
            </div>
        </div>

        <button class="btn-gerar" id="btn-gerar" onclick="processarDeposito()">
            <i class="fas fa-bolt"></i> GERAR PIX AGORA
        </button>
    </div>

    <div id="qr-container-wrapper" style="display: none; text-align: center;">
        <div class="deposit-card">
            <h3>PIX Gerado com Sucesso!</h3>
            <p style="color: #888; margin: 10px 0;">Escaneie o código ou copie a chave</p>
            
            <div id="qr-container">
                <img id="qr-img" src="" alt="QR Code">
            </div>

            <div class="pix-box" id="pix-copy-text">Copiando código...</div>
            
            <button class="btn-copy" onclick="copiarPix()">
                <i class="fas fa-copy"></i> COPIAR CÓDIGO PIX
            </button>

            <p style="margin-top: 20px; font-size: 14px; color: var(--green);">
                <i class="fas fa-sync fa-spin"></i> Aguardando pagamento...
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uidUsuario, nomeUsuario, pixGlobal;

        // Verifica login e busca dados do usuário
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uidUsuario = user.uid;
                const userDoc = await getDoc(doc(db, "users", uidUsuario));
                if (userDoc.exists()) {
                    nomeUsuario = userDoc.data().nome || "Cliente";
                    if (userDoc.data().cpf) document.getElementById('deposito-cpf').value = userDoc.data().cpf;
                }
            } else {
                window.location.href = "login.html";
            }
        });

        window.processarDeposito = async function() {
            const valorInput = document.getElementById('deposito-valor').value;
            const cpfInput = document.getElementById('deposito-cpf').value.replace(/\D/g, "");
            const btn = document.getElementById('btn-gerar');

            if (!valorInput || parseFloat(valorInput) < 1) {
                return Swal.fire({ icon: 'error', title: 'Valor inválido', text: 'Depósito mínimo de R$ 1,00', background: '#1a0505', color: '#fff' });
            }

            if (cpfInput.length !== 11) {
                return Swal.fire({ icon: 'error', title: 'CPF Inválido', text: 'Digite os 11 dígitos do seu CPF.', background: '#1a0505', color: '#fff' });
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESSANDO...';

            try {
                const response = await fetch('/.netlify/functions/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: parseFloat(valorInput),
                        userId: uidUsuario,
                        userName: nomeUsuario,
                        userDocument: cpfInput
                    })
                });

                const data = await response.json();

                if (data.success) {
                    pixGlobal = data.pix_code || data.pixCode;
                    document.getElementById('deposito-screen').style.display = 'none';
                    document.getElementById('qr-container-wrapper').style.display = 'block';
                    document.getElementById('qr-img').src = data.qr_image || data.qrImage;
                    document.getElementById('pix-copy-text').innerText = pixGlobal;

                    // Escuta em tempo real se a transação foi paga
                    onSnapshot(doc(db, "users", uidUsuario, "transactions", data.transactionId), (docSnap) => {
                        if (docSnap.exists() && (docSnap.data().status === 'PAID' || docSnap.data().status === 'completed')) {
                            Swal.fire({
                                icon: 'success',
                                title: 'Pagamento Confirmado!',
                                text: 'Seu saldo foi atualizado.',
                                background: '#1a0505',
                                color: '#fff',
                                timer: 3000,
                                showConfirmButton: false
                            }).then(() => {
                                window.location.href = "home.html";
                            });
                        }
                    });

                } else {
                    throw new Error(data.error || "Erro ao gerar PIX");
                }
            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'Falha', text: error.message, background: '#1a0505', color: '#fff' });
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt"></i> GERAR PIX AGORA';
            }
        };

        window.copiarPix = function() {
            if (!pixGlobal) return;
            navigator.clipboard.writeText(pixGlobal).then(() => {
                Swal.fire({ icon: 'success', title: 'Copiado!', text: 'Cole no seu aplicativo do banco.', timer: 1500, showConfirmButton: false, background: '#1a0505', color: '#fff' });
            });
        };
    </script>
</body>
</html>
