<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacar - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: linear-gradient(180deg, #1a0505 0%, #000000 100%);
            --card: rgba(255, 255, 255, 0.05);
            --red: #e74c3c;
            --green: #2ecc71;
            --gold: #FFD700;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg); 
            color: white; 
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .header a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            width: 40px;
            height: 40px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .withdraw-card {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balance-info {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balance-info span { color: #888; font-size: 14px; }
        .balance-info h2 { color: var(--gold); font-size: 32px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #888; font-size: 14px; }
        
        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        select option { background: #1a0505; }

        .btn-sacar {
            width: 100%;
            background: var(--gold);
            color: black;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-sacar:disabled { opacity: 0.5; cursor: not-allowed; }

        .rules {
            margin-top: 25px;
            background: rgba(255, 215, 0, 0.05);
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            color: #ccc;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html"><i class="fas fa-chevron-left"></i></a>
        <h2>Solicitar Saque</h2>
    </div>

    <div class="withdraw-card">
        <div class="balance-info">
            <span>Saldo Disponível</span>
            <h2 id="saldo-exibicao">R$ 0,00</h2>
        </div>

        <div class="input-group">
            <label>Valor do Saque</label>
            <input type="number" id="valor-saque" placeholder="Mínimo R$ 20,00">
        </div>

        <div class="input-group">
            <label>Tipo de Chave PIX</label>
            <select id="tipo-pix">
                <option value="cpf">CPF</option>
                <option value="email">E-mail</option>
                <option value="telefone">Telefone</option>
                <option value="aleatoria">Chave Aleatória</option>
            </select>
        </div>

        <div class="input-group">
            <label>Chave PIX</label>
            <input type="text" id="chave-pix" placeholder="Digite sua chave aqui">
        </div>

        <button class="btn-sacar" id="btn-sacar" onclick="solicitarSaque()">
            REALIZAR SAQUE
        </button>

        <div class="rules">
            <p><i class="fas fa-info-circle"></i> <b>Regras de Saque:</b></p>
            • Processamento em até 24 horas úteis.<br>
            • Taxa de processamento: 10% sobre o valor.<br>
            • Certifique-se de que a chave PIX está correta.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uidUsuario, saldoAtual = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                uidUsuario = user.uid;
                // Monitora o saldo em tempo real
                onSnapshot(doc(db, "users", uidUsuario), (snap) => {
                    if (snap.exists()) {
                        saldoAtual = snap.data().balance || 0;
                        document.getElementById('saldo-exibicao').innerText = `R$ ${saldoAtual.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                    }
                });
            } else {
                window.location.href = "login.html";
            }
        });

        window.solicitarSaque = async function() {
            const valorInput = document.getElementById('valor-saque').value;
            const valorSaque = parseFloat(valorInput);
            const chavePix = document.getElementById('chave-pix').value;
            const tipoPix = document.getElementById('tipo-pix').value;
            const btn = document.getElementById('btn-sacar');

            if (!valorInput || valorSaque < 20) {
                return Swal.fire({ icon: 'error', title: 'Valor Mínimo', text: 'O valor mínimo para saque é R$ 20,00', background: '#1a0505', color: '#fff' });
            }

            if (valorSaque > saldoAtual) {
                return Swal.fire({ icon: 'error', title: 'Saldo Insuficiente', text: 'Você não possui saldo disponível para este valor.', background: '#1a0505', color: '#fff' });
            }

            if (chavePix.length < 5) {
                return Swal.fire({ icon: 'error', title: 'Chave Inválida', text: 'Por favor, informe uma chave PIX válida.', background: '#1a0505', color: '#fff' });
            }

            btn.disabled = true;
            Swal.fire({ title: 'Processando...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#1a0505', color: '#fff' });

            try {
                // Chamada para a sua Netlify Function
                const response = await fetch('/.netlify/functions/create-withdraw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: uidUsuario,
                        amount: valorSaque,
                        pixKey: chavePix,
                        pixType: tipoPix
                    })
                });

                const data = await response.json();

                if (data.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: 'Solicitação Enviada!',
                        text: 'Seu saque está em análise e será pago em breve.',
                        background: '#1a0505',
                        color: '#fff'
                    });
                    window.location.href = "home.html";
                } else {
                    throw new Error(data.error || "Erro ao processar saque");
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Erro', text: error.message, background: '#1a0505', color: '#fff' });
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
