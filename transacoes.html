<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(180deg, #1a0505 0%, #000000 100%);
            --card: rgba(255, 255, 255, 0.05);
            --green: #2ecc71;
            --red: #e74c3c;
            --gold: #FFD700;
            --skeleton-bg: rgba(255, 255, 255, 0.08);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            padding: 20px; 
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .header a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            width: 40px;
            height: 40px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        /* ABAS DE FILTRO */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: var(--card);
            padding: 5px;
            border-radius: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #888;
            font-weight: 600;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--gold);
            color: black;
        }

        /* LISTA DE TRANSAÇÕES */
        #transactions-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .transaction-card {
            background: var(--card);
            padding: 18px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .trans-info h4 {
            font-size: 15px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trans-info small { color: #666; font-size: 12px; }

        .amount { font-weight: 700; font-size: 16px; }
        .amount.plus { color: var(--green); }
        .amount.minus { color: var(--red); }

        /* STATUS PILLS */
        .status-pill {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 800;
        }
        .status-completed, .status-PAID { background: rgba(46, 204, 113, 0.2); color: var(--green); }
        .status-pending, .status-processing { background: rgba(255, 215, 0, 0.2); color: var(--gold); }
        .status-rejected, .status-failed { background: rgba(231, 76, 60, 0.2); color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555;
        }
        .empty-state i { font-size: 40px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html"><i class="fas fa-chevron-left"></i></a>
        <h2>Histórico</h2>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="filtrar('todos', event)">Tudo</button>
        <button class="tab-btn" onclick="filtrar('deposit', event)">Depósitos</button>
        <button class="tab-btn" onclick="filtrar('withdrawal', event)">Saques</button>
    </div>

    <div id="transactions-container">
        <div class="empty-state">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p>Carregando transações...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uidUsuario;
        let transacoesGlobais = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                uidUsuario = user.uid;
                carregarTransacoes();
            } else {
                window.location.href = "login.html";
            }
        });

        async function carregarTransacoes() {
            const container = document.getElementById('transactions-container');
            
            try {
                // Busca na subcoleção do usuário
                const q = query(
                    collection(db, "users", uidUsuario, "transactions"), 
                    orderBy("createdAt", "desc"), 
                    limit(40)
                );

                const querySnapshot = await getDocs(q);
                transacoesGlobais = [];

                querySnapshot.forEach((doc) => {
                    transacoesGlobais.push({ id: doc.id, ...doc.data() });
                });

                renderizar(transacoesGlobais);

            } catch (error) {
                console.error("Erro ao carregar histórico:", error);
                container.innerHTML = '<div class="empty-state"><p>Erro ao carregar dados.</p></div>';
            }
        }

        function renderizar(lista) {
            const container = document.getElementById('transactions-container');
            container.innerHTML = "";

            if (lista.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-history"></i>
                        <p>Nenhuma transação encontrada.</p>
                    </div>`;
                return;
            }

            lista.forEach((t) => {
                const dataF = t.createdAt?.toDate().toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) || '---';
                
                // Define se é entrada ou saída
                const isEntrada = t.type === 'deposit' || t.type === 'deposito';
                const corClass = isEntrada ? 'plus' : 'minus';
                const sinal = isEntrada ? '+' : '-';
                
                // Mapeia o status para o texto e classe CSS
                const statusTexto = t.status || 'pendente';
                const statusClass = `status-${statusTexto}`;

                container.innerHTML += `
                    <div class="transaction-card">
                        <div class="trans-info">
                            <h4>
                                ${t.description || (isEntrada ? 'Depósito PIX' : 'Saque PIX')} 
                                <span class="status-pill ${statusClass}">${statusTexto}</span>
                            </h4>
                            <small>${dataF}</small>
                        </div>
                        <div class="amount ${corClass}">
                            ${sinal} R$ ${parseFloat(t.amount || 0).toFixed(2).replace('.', ',')}
                        </div>
                    </div>
                `;
            });
        }

        window.filtrar = (tipo, event) => {
            // Atualiza botões
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (tipo === 'todos') {
                renderizar(transacoesGlobais);
            } else {
                const filtradas = transacoesGlobais.filter(t => t.type === tipo);
                renderizar(filtradas);
            }
        };
    </script>
</body>
</html>
