<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Nexus Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* DESIGN SYSTEM PREMIUM FINTECH */
        :root {
            --bg-main: #0b0f1a;
            --bg-card: #121826;
            --primary: #4f8cff;
            --secondary: #7cf3ff;
            --accent: #9b8cff;
            --success: #22c55e;
            --text: #ffffff;
            --text-soft: #9aa4b2;
            --radius: 18px;

            /* Sobrescrevendo as antigas variáveis de cores usadas no JS injetado */
            --red: var(--primary); /* Transforma elementos vermelhos do JS em azul primário */
            --green: var(--success);
            --gold: #FFD700;
            --telegram: #0088cc;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: linear-gradient(180deg, var(--bg-main) 0%, #05070f 100%); 
            color: var(--text); 
            padding-bottom: 110px; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* ANIMAÇÕES GERAIS */
        .fade-in { animation: fadeIn 0.8s ease-in-out; }
        .slide-up { animation: slideUp 0.6s ease-out; }
        .hover-scale { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-scale:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(79,140,255,0.3); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* MURAL DE AVISO DINÂMICO */
        #container-aviso {
            display: none;
            margin: 80px 20px 10px; /* Margem ajustada por causa do top-bar fixo */
            padding: 15px;
            background: rgba(79, 140, 255, 0.1);
            border: 1px solid rgba(79, 140, 255, 0.3);
            border-radius: var(--radius);
            color: var(--secondary);
            font-size: 0.85rem;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: pulse-neon 2s infinite;
        }

        @keyframes pulse-neon {
            0% { box-shadow: 0 0 0 0 rgba(79, 140, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(79, 140, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 140, 255, 0); }
        }

        /* HEADER MODERNO FIXO (GLASSMORPHISM) */
        .top-bar { 
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 20px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(18, 24, 38, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .user-greeting { display: flex; flex-direction: column; }
        .logo-home { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }
        .logo-home span { color: var(--primary); }
        .user-greeting h2 { font-size: 0.95rem; color: var(--text-soft); font-weight: 500; text-transform: capitalize; margin-top: 2px;}
        .top-bar-icons { display: flex; gap: 15px; align-items: center; }
        .top-bar-icons a { color: var(--text); font-size: 1.3rem; transition: color 0.3s; }
        .top-bar-icons a:hover { color: var(--primary); }

        /* CARD DE SALDO PREMIUM */
        .portfolio-wrapper { margin: 100px 20px 20px; } /* Espaço para o header fixo */
        .portfolio-card { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 24px; 
            padding: 30px 25px; 
            box-shadow: 0 15px 35px rgba(79, 140, 255, 0.25);
            position: relative;
            overflow: hidden;
        }
        /* Efeito de brilho no card */
        .portfolio-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0.5; pointer-events: none;
        }

        .portfolio-header { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .portfolio-header small { color: rgba(255,255,255,0.8); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; margin-top: 15px; font-weight: 600;}
        .balance-main { font-size: 2.5rem; font-weight: 800; color: #fff; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 5px; }
        
        /* VIP Badges */
        .vip-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.1); }
        .vip-bronze { color: #f0c090; }
        .vip-ouro { color: #FFD700; }
        .vip-diamante { color: var(--secondary); border-color: var(--secondary); text-shadow: 0 0 8px rgba(124, 243, 255, 0.5); }

        /* GRID DE ESTATÍSTICAS */
        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            margin: 0 20px 25px; 
        }
        .stat-item { 
            background: var(--bg-card); padding: 15px; border-radius: var(--radius); 
            border: 1px solid rgba(255,255,255,0.02); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 5px;
        }
        .stat-item span { font-size: 0.7rem; color: var(--text-soft); font-weight: 600; text-transform: uppercase; }
        .stat-item strong { font-size: 1.1rem; color: var(--text); font-weight: 700; }

        /* AÇÕES RÁPIDAS (GRID 2x2) */
        .actions-section { padding: 0 20px 10px; }
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-btn { 
            background: var(--bg-card); border-radius: var(--radius); padding: 20px 15px; 
            text-align: center; color: var(--text); text-decoration: none; 
            border: 1px solid rgba(255,255,255,0.03); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 600;
        }
        .action-btn i { 
            font-size: 1.6rem; margin-bottom: 12px; 
            background: -webkit-linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* LISTA DE INVESTIMENTOS Premium */
        .section-title { padding: 15px 25px 5px; font-size: 0.9rem; color: var(--text); font-weight: 700; letter-spacing: 0.5px; }
        .plans-stack { padding: 10px 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Modificando os elementos injetados pelo JS via CSS */
        .active-plan-item { 
            background: var(--bg-card); border-radius: var(--radius); padding: 20px; 
            border: 1px solid rgba(79, 140, 255, 0.15); position: relative; overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .active-plan-item::before {
            content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }
        
        .plan-progress-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; width: 100%; margin-top: 15px; overflow: hidden; }
        
        /* A barra de progresso perde o vermelho e ganha degradê neon */
        .plan-progress-bar { 
            height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)) !important; 
            border-radius: 10px; 
            box-shadow: 0 0 10px var(--primary) !important; 
            transition: width 1s linear;
        }

        /* Telegram Button */
        .btn-tg {
            position: fixed; bottom: 95px; right: 20px; background: var(--telegram);
            width: 55px; height: 55px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-size: 1.6rem; z-index: 999; text-decoration: none;
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.4);
            transition: transform 0.3s;
        }
        .btn-tg:hover { transform: scale(1.1); }

        /* Social Pop */
        .social-pop { 
            position: fixed; bottom: 95px; left: 20px; right: 85px; 
            background: var(--bg-card); color: var(--text); padding: 14px 18px; 
            border-radius: var(--radius); display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 9998; 
            transform: translateX(-150%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .social-pop.show { transform: translateX(0); }

        /* Nav Bottom MODERNO (Estilo App) */
        .nav-bottom { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(18, 24, 38, 0.85); 
            display: flex; justify-content: space-around; 
            padding: 15px 10px 25px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
        }
        .nav-item { 
            color: var(--text-soft); text-align: center; text-decoration: none; 
            font-size: 0.7rem; font-weight: 500; padding: 5px;
            transition: all 0.3s; display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .nav-item i { font-size: 1.4rem; transition: all 0.3s; }

        .nav-item.active { color: var(--text); }
        .nav-item.active i { 
            color: var(--primary); 
            filter: drop-shadow(0 0 8px rgba(79, 140, 255, 0.6));
            transform: translateY(-2px);
        }

        /* FORÇANDO O NOVO ESTILO NOS ALERTAS DO JS ORIGINAL */
        div.swal2-popup { background: var(--bg-card) !important; color: var(--text) !important; border: 1px solid rgba(79, 140, 255, 0.2); }
        .swal2-title, .swal2-html-container { color: var(--text) !important; }
        .swal2-confirm { background-color: var(--primary) !important; color: #fff !important; box-shadow: 0 4px 15px rgba(79, 140, 255, 0.3) !important; }

    </style>
</head>
<body>

    <a href="https://t.me/+Z6pv35vKSuA4MDhh" target="_blank" class="btn-tg hover-scale"><i class="fab fa-telegram-plane"></i></a>

    <div id="social-pop" class="social-pop">
        <i class="fas fa-check-circle" style="color: var(--success); font-size: 1.2rem;"></i>
        <p id="social-content" style="font-size: 0.8rem;"></p>
    </div>

    <div class="top-bar slide-up">
        <div class="user-greeting">
            <div class="logo-home"><span>Nex</span>us</div>
            <h2 id="home-nome">Carregando...</h2>
        </div>
        <div class="top-bar-icons">
            <a href="#"><i class="far fa-bell"></i></a>
            <a href="perfil.html"><i class="fas fa-user-circle"></i></a>
        </div>
    </div>

    <div id="container-aviso" class="animate__animated animate__fadeInDown">
        <i class="fas fa-bullhorn" style="margin-right: 8px; color: var(--secondary);"></i>
        <span id="texto-aviso"></span>
    </div>

    <div class="portfolio-wrapper slide-up">
        <div class="portfolio-card hover-scale">
            <div class="portfolio-header">
                <div id="vip-tag" class="vip-badge vip-bronze">
                    <i class="fas fa-crown"></i> <span id="vip-nome">VIP Bronze</span>
                </div>
                <small>Saldo Total Disponível</small>
                <div class="balance-main">
                    <span id="home-saldo">R$ 0,00</span>
                    <i class="fas fa-eye" id="toggle-balance" style="font-size: 1.2rem; color: rgba(255,255,255,0.6); cursor: pointer; transition: 0.3s;"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-grid fade-in">
        <div class="stat-item"><span>Total Investido</span><strong id="stat-investido">R$ 0,00</strong></div>
        <div class="stat-item"><span>Total Ganhos</span><strong id="stat-ganhos" style="color:var(--success)">R$ 0,00</strong></div>
        <div class="stat-item"><span>Para Investir</span><strong id="stat-investir">R$ 0,00</strong></div>
        <div class="stat-item"><span>Para Saque</span><strong id="stat-saque">R$ 0,00</strong></div>
    </div>

    <div class="actions-section fade-in">
        <div class="actions-grid">
            <a href="deposito.html" class="action-btn hover-scale">
                <i class="fas fa-arrow-down"></i>Depositar
            </a>
            <a href="saque.html" class="action-btn hover-scale">

            </a>

            <a href="indicacao.html" class="action-btn hover-scale">
                <i class="fas fa-user-friends"></i>Convidar
            </a>
        </div>
    </div>

    <h3 class="section-title fade-in">Meus Investimentos</h3>
    <div id="lista-investimentos" class="plans-stack"></div>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item active"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="planos.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Planos</span></a>
        <a href="indicacao.html" class="nav-item"><i class="fas fa-share-nodes"></i><span>Indicar</span></a>
        <a href="perfil.html" class="nav-item"><i class="fas fa-user"></i><span>Perfil</span></a>
    </nav>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, addDoc, Timestamp, increment, onSnapshot, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
    authDomain: "monety-site-9175f.firebaseapp.com",
    projectId: "monety-site-9175f",
    storageBucket: "monety-site-9175f.firebasestorage.app",
    messagingSenderId: "840821848803",
    appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// --- UTILITÁRIOS ---
let saldoVisivel = localStorage.getItem('saldoVisivel') !== 'false';

function formatarMoeda(valor) {
    if (!saldoVisivel) return "R$ ******";
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor || 0);
}

// --- SISTEMA DE NOTIFICAÇÕES (SOCIAL PROOF) ---
const nomes_pop = ["Marcos S.", "Julia R.", "Phelipe A.", "Ana Paula", "Bruno K.", "Carlos G.", "Diego M."];
const tipos_pop = ["acabou de sacar", "recebeu lucro de", "ativou um novo plano"];
function showPop() {
    const pop = document.getElementById('social-pop');
    const content = document.getElementById('social-content');
    if(!pop || !content) return;
    const nome = nomes_pop[Math.floor(Math.random()*nomes_pop.length)];
    const tipo = tipos_pop[Math.floor(Math.random()*tipos_pop.length)];
    const valor = (Math.random() * (450 - 30) + 30).toFixed(2);
    content.innerHTML = `<b>${nome}</b> ${tipo} <span style="color:var(--success); font-weight:700">R$ ${valor}</span>`;
    pop.classList.add('show');
    setTimeout(() => pop.classList.remove('show'), 4000);
}
setInterval(showPop, 12000);

// --- MURAL DE AVISO ---
async function carregarAviso() {
    try {
        const docRef = doc(db, "configuracoes", "aviso_global");
        const snap = await getDoc(docRef);
        if (snap.exists() && snap.data().texto.trim() !== "") {
            document.getElementById('texto-aviso').innerText = snap.data().texto;
            document.getElementById('container-aviso').style.display = 'block';
        }
    } catch (e) { console.error("Erro aviso:", e); }
}

// --- ANIMAÇÃO DE PROGRESSO ---
function iniciarAnimacaoProgresso() {
    const interval = setInterval(() => {
        const agora = new Date().getTime();
        const bars = document.querySelectorAll('.progress-timer');
        if (bars.length === 0) return;
        
        bars.forEach(bar => {
            const inicio = parseInt(bar.getAttribute('data-inicio'));
            const fim = bar.getAttribute('data-fim');
            if (fim) {
                const total = parseInt(fim) - inicio;
                const decorrido = agora - inicio;
                let percentagem = (decorrido / total) * 100;
                bar.style.width = Math.min(100, Math.max(0, percentagem)).toFixed(4) + '%';
            }
        });
    }, 1000);
}

// --- ESCUTA EM TEMPO REAL (CORAÇÃO DO CÓDIGO) ---
onAuthStateChanged(auth, (user) => {
    if (user) {
        // Escuta mudanças no documento do usuário (Saldo, Nome, etc)
        onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
            if (docSnap.exists()) {
                const userData = docSnap.data();
                if (userData.status === "bloqueado") {
                    signOut(auth).then(() => window.location.href = "login.html?error=blocked");
                    return;
                }
                
                // 1. Atualiza Nome e Saldo Imediatamente
                document.getElementById('home-nome').innerText = `Olá, ${userData.nome || "Investidor"}`;
                
                const saldoPrincipal = Number(userData.saldo) || 0;
                const saldoLucro = Number(userData.saldoLucro) || 0;
                const totalGanhos = Number(userData.totalGanhos) || 0;
                const saldoTotal = saldoPrincipal + saldoLucro;

                const atualizarElementosSaldo = () => {
                    document.getElementById('home-saldo').innerText = formatarMoeda(saldoTotal);
                    document.getElementById('stat-ganhos').innerText = formatarMoeda(totalGanhos);
                    document.getElementById('stat-investir').innerText = formatarMoeda(saldoPrincipal);
                    document.getElementById('stat-saque').innerText = formatarMoeda(saldoLucro);
                    document.getElementById('toggle-balance').className = saldoVisivel ? "fas fa-eye" : "fas fa-eye-slash";
                };

                atualizarElementosSaldo();

                // Toggle de visibilidade
                document.getElementById('toggle-balance').onclick = () => {
                    saldoVisivel = !saldoVisivel;
                    localStorage.setItem('saldoVisivel', saldoVisivel);
                    atualizarElementosSaldo();
                    // Atualiza também o total investido que é carregado depois
                    carregarInvestimentos(user.uid);
                };

                // 2. Dispara funções secundárias
                carregarInvestimentos(user.uid);
                carregarAviso();
                
                // Só processa lucros e boas-vindas uma vez por sessão para não travar a UI
                if (!window.processamentoInicialRealizado) {
                    window.processamentoInicialRealizado = true;
                    processarLogicaNegocio(user.uid, userData);
                }
            }
        });
    } else {
        window.location.href = "login.html";
    }
});

async function carregarInvestimentos(uid) {
    try {
        const q = query(collection(db, "investimentos"), where("userId", "==", uid), where("status", "==", "ativo"));
        const snap = await getDocs(q);
        let totalInvestido = 0;
        let htmlContent = "";
        const agora = new Date();

        snap.forEach(docInv => {
            const inv = docInv.data();
            totalInvestido += Number(inv.valor || 0);
            
            const dataCriacao = inv.timestamp?.toDate() || agora;
            const dataExpiracao = inv.dataExpiracao?.toDate();
            let progresso = 0;
            if (dataExpiracao) {
                progresso = Math.min(100, Math.max(0, ((agora - dataCriacao) / (dataExpiracao - dataCriacao)) * 100));
            }

            htmlContent += `
                <div class="active-plan-item animate__animated animate__fadeInUp">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div>
                            <h4 style="font-size:0.95rem; font-weight:700"><i class="fas fa-layer-group" style="color:var(--red); margin-right:5px;"></i> ${inv.plano}</h4>
                            <small style="color:var(--green); font-weight:600"><i class="fas fa-arrow-up"></i> + ${formatarMoeda(inv.rendimentoDiario)} / dia</small>
                        </div>
                        <div style="text-align:right">
                            <strong style="font-size:1rem">${formatarMoeda(inv.valor)}</strong>
                            <br><small style="color:var(--text-soft); font-size:0.6rem; text-transform:uppercase">Investido</small>
                        </div>
                    </div>
                    <div class="plan-progress-bg">
                        <div class="plan-progress-bar progress-timer" 
                             data-inicio="${dataCriacao.getTime()}" 
                             data-fim="${dataExpiracao ? dataExpiracao.getTime() : ''}" 
                             style="width:${progresso}%">
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById('lista-investimentos').innerHTML = htmlContent || '<p style="text-align:center; color:var(--text-soft); font-size:0.85rem; margin-top:20px;">Nenhum investimento ativo.</p>';
        document.getElementById('stat-investido').innerText = formatarMoeda(totalInvestido);
        
        // Atualiza Badge VIP
        const vipTag = document.getElementById('vip-tag');
        const vipNome = document.getElementById('vip-nome');
        if (totalInvestido >= 2000) { vipTag.className = "vip-badge vip-diamante"; vipNome.innerText = "VIP Diamante"; }
        else if (totalInvestido >= 500) { vipTag.className = "vip-badge vip-ouro"; vipNome.innerText = "VIP Ouro"; }
        else { vipTag.className = "vip-badge vip-bronze"; vipNome.innerText = "VIP Bronze"; }

    } catch (e) { console.error("Erro investimentos:", e); }
}

async function processarLogicaNegocio(uid, userData) {
    // 1. Verificar boas vindas
    if (!sessionStorage.getItem('notificacaoBoasVindas')) {
        await Swal.fire({
            title: `<span style="color: var(--primary);">Nexus</span> Premium`,
            html: `<p style="color: var(--text-soft); font-size: 0.9rem;">Bem-vindo de volta, <b>${userData.nome}</b>!<br>Seus rendimentos são processados a cada 24h.</p>`,
            background: '#121826',
            color: '#fff',
            confirmButtonText: 'ACESSAR PAINEL',
            confirmButtonColor: '#4f8cff',
            borderRadius: '24px'
        });
        sessionStorage.setItem('notificacaoBoasVindas', 'true');
    }

    // 2. Logica de lucros diários (só roda uma vez ao entrar)
    try {
        const q = query(collection(db, "investimentos"), where("userId", "==", uid), where("status", "==", "ativo"));
        const snap = await getDocs(q);
        const agora = new Date();
        const vinteQuatroHoras = 24 * 60 * 60 * 1000;
        let ganhosParaCreditar = 0;
        const updates = [];

        for (const docInv of snap.docs) {
            const inv = docInv.data();
            const dataCriacao = inv.timestamp.toDate();
            const dataReferencia = inv.ultimoPagamento ? inv.ultimoPagamento.toDate() : dataCriacao;
            const diff = agora.getTime() - dataReferencia.getTime();

            if (diff >= vinteQuatroHoras) {
                const ciclos = Math.floor(diff / vinteQuatroHoras);
                ganhosParaCreditar += (Number(inv.rendimentoDiario) * ciclos);
                const novoHorarioFixo = Timestamp.fromMillis(dataReferencia.getTime() + (ciclos * vinteQuatroHoras));
                updates.push(updateDoc(doc(db, "investimentos", docInv.id), { ultimoPagamento: novoHorarioFixo }));
            }
        }

        if (ganhosParaCreditar > 0) {
            await updateDoc(doc(db, "usuarios", uid), {
                saldoLucro: increment(ganhosParaCreditar),
                totalGanhos: increment(ganhosParaCreditar)
            });
            await addDoc(collection(db, "historico"), {
                userId: uid, valor: ganhosParaCreditar, tipo: 'Rendimento', data: Timestamp.now()
            });
            Swal.fire({ title: 'Lucros Creditados!', text: `R$ ${ganhosParaCreditar.toFixed(2)} adicionados ao seu saldo.`, icon: 'success' });
        }
        
        if (updates.length > 0) await Promise.all(updates);
        iniciarAnimacaoProgresso();

    } catch (e) { console.error("Erro lucro:", e); }
}
    </script>
</body>
