<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg: #070b14;
            --card: #111827;
            --primary: #5b8cff;
            --accent: #7c3aed;
            --success: #22c55e;
            --text: #ffffff;
            --text-soft: #94a3b8;
            --radius: 18px;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            padding-bottom: 100px; 
            overflow-x: hidden;
        }

        /* ANIMAÇÕES */
        .fade-in { animation: fadeIn 0.6s ease-out; }
        .slide-up { animation: slideUp 0.5s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* HEADER MODERNO */
        .header {
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
            border: 2px solid var(--glass-border);
        }

        .welcome-text h2 { font-size: 0.9rem; color: var(--text-soft); font-weight: 400; }
        .welcome-text p { font-size: 1.1rem; font-weight: 700; color: #fff; }

        .header-actions i {
            font-size: 1.4rem; color: var(--text-soft);
            background: var(--glass);
            padding: 10px; border-radius: 12px;
        }

        /* SUPER CARD DE SALDO */
        .main-container { padding: 20px; }

        .balance-super-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 30px 20px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }

        .balance-super-card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(91,140,255,0.1) 0%, transparent 70%);
        }

        .balance-label { color: var(--text-soft); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block;}
        .balance-value { font-size: 2.5rem; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }

        .quick-actions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .action-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 16px;
            color: #fff; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            font-size: 0.75rem; font-weight: 600;
            transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .action-btn i { font-size: 1.2rem; color: var(--primary); }

        /* CHECK-IN DIÁRIO */
        .checkin-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }

        .checkin-info h3 { font-size: 1rem; margin-bottom: 4px; }
        .checkin-info p { font-size: 0.8rem; color: var(--text-soft); }
        
        .btn-checkin {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none; padding: 10px 18px; border-radius: 12px;
            color: #fff; font-weight: 700; font-size: 0.85rem;
        }

        /* SEÇÕES DE TÍTULO */
        .section-title {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 0 5px;
        }
        .section-title h3 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--primary); }

        /* LISTA DE INVESTIMENTOS */
        #lista-investimentos { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .invest-card {
            background: var(--card);
            padding: 18px; border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .invest-details h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .invest-details p { font-size: 0.8rem; color: var(--text-soft); }
        
        .status-badge {
            padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        }
        .status-ativo { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .status-finalizado { background: rgba(148, 163, 184, 0.1); color: var(--text-soft); }

        /* ATIVIDADE RECENTE (TIMELINE) */
        .activity-timeline {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px; border: 1px solid var(--glass-border);
        }
        #historico-atividades { display: flex; flex-direction: column; gap: 20px; position: relative; }
        .activity-item {
            display: flex; gap: 15px; position: relative;
        }
        .activity-icon {
            width: 35px; height: 35px; border-radius: 10px;
            background: var(--glass);
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
        }
        .activity-content h5 { font-size: 0.9rem; margin-bottom: 2px; }
        .activity-content p { font-size: 0.75rem; color: var(--text-soft); }

        /* NAVBAR INFERIOR */
        .nav-bottom {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(11, 18, 32, 0.95);
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-around;
            padding: 15px 10px 25px;
            border-top: 1px solid var(--glass-border);
            z-index: 1000;
        }
        .nav-item {
            color: var(--text-soft); text-decoration: none;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            font-size: 0.7rem; font-weight: 500; transition: 0.3s;
        }
        .nav-item i { font-size: 1.4rem; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { text-shadow: 0 0 15px var(--primary); }

    </style>
</head>
<body>

    <header class="header fade-in">
        <div class="user-info">
            <div class="avatar" id="user-initials">U</div>
            <div class="welcome-text">
                <h2 id="greeting">Boa tarde,</h2>
                <p id="user-name">Carregando...</p>
            </div>
        </div>
        <div class="header-actions">
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <main class="main-container">
        
        <section class="balance-super-card slide-up">
            <span class="balance-label">Saldo Total</span>
            <div class="balance-value" id="user-balance">R$ 0,00</div>
            
            <div class="quick-actions-grid">
                <a href="deposito.html" class="action-btn">
                    <i class="fas fa-plus-circle"></i>
                    <span>Depositar</span>
                </a>
                <a href="saque.html" class="action-btn">
                    <i class="fas fa-wallet"></i>
                    <span>Sacar</span>
                </a>
                <a href="planos.html" class="action-btn">
                    <i class="fas fa-chart-line"></i>
                    <span>Investir</span>
                </a>
            </div>
        </section>

        <section class="checkin-card slide-up" style="animation-delay: 0.1s;">
            <div class="checkin-info">
                <h3>🎁 Check-in Diário</h3>
                <p>Sequência atual: <span id="checkin-streak">0</span> dias</p>
            </div>
            <button class="btn-checkin" onclick="coletarBonusDiario()">Coletar</button>
        </section>

        <div class="section-title slide-up" style="animation-delay: 0.2s;">
            <h3><i class="fas fa-bolt"></i> Ações Rápidas</h3>
        </div>
        <div class="quick-actions-grid slide-up" style="animation-delay: 0.2s; margin-bottom: 30px;">
            <a href="planos.html" class="action-btn">
                <i class="fas fa-th-large"></i>
                <span>Planos</span>
            </a>
            <a href="indicacao.html" class="action-btn">
                <i class="fas fa-users"></i>
                <span>Indicar</span>
            </a>
            <a href="suporte.html" class="action-btn">
                <i class="fas fa-headset"></i>
                <span>Suporte</span>
            </a>
        </div>

        <div class="section-title slide-up" style="animation-delay: 0.3s;">
            <h3><i class="fas fa-chart-pie"></i> Seus Investimentos</h3>
        </div>
        <div id="lista-investimentos" class="slide-up" style="animation-delay: 0.3s;">
            <p style="color: var(--text-soft); font-size: 0.8rem; text-align: center; padding: 20px;">Nenhum investimento ativo no momento.</p>
        </div>

        <div class="section-title slide-up" style="animation-delay: 0.4s;">
            <h3><i class="fas fa-history"></i> Atividade Recente</h3>
        </div>
        <div class="activity-timeline slide-up" style="animation-delay: 0.4s;">
            <div id="historico-atividades">
                </div>
        </div>

    </main>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="planos.html" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Investir</span>
        </a>
        <a href="indicacao.html" class="nav-item">
            <i class="fas fa-user-friends"></i>
            <span>Indicar</span>
        </a>
        <a href="perfil.html" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // SUA CONFIGURAÇÃO FIREBASE (MANTIDA)
        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Saudação Dinâmica
        function updateGreeting() {
            const hour = new Date().getHours();
            const g = document.getElementById('greeting');
            if (hour < 12) g.innerText = "Bom dia,";
            else if (hour < 18) g.innerText = "Boa tarde,";
            else g.innerText = "Boa noite,";
        }
        updateGreeting();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "usuarios", user.uid);
                const snap = await getDoc(userRef);
                
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('user-name').innerText = data.nome || "Investidor";
                    document.getElementById('user-initials').innerText = (data.nome || "U").charAt(0).toUpperCase();
                    
                    // Saldo (Suporta 'saldo' ou 'balance')
                    const saldo = data.saldo || data.balance || 0;
                    document.getElementById('user-balance').innerText = `R$ ${saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                }

                carregarInvestimentos(user.uid);
                carregarAtividades(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        async function carregarInvestimentos(uid) {
            const q = query(collection(db, "investimentos"), where("userId", "==", uid));
            const snap = await getDocs(q);
            const container = document.getElementById('lista-investimentos');
            
            if (!snap.empty) container.innerHTML = "";
            
            snap.forEach(doc => {
                const inv = doc.data();
                const statusClass = inv.status === 'ativo' ? 'status-ativo' : 'status-finalizado';
                container.innerHTML += `
                    <div class="invest-card">
                        <div class="invest-details">
                            <h4>Plano ${inv.plano}</h4>
                            <p>Rendimento: R$ ${inv.rendimentoDiario.toFixed(2)}/dia</p>
                        </div>
                        <span class="status-badge ${statusClass}">${inv.status}</span>
                    </div>
                `;
            });
        }

        async function carregarAtividades(uid) {
            const q = query(collection(db, "historico"), where("userId", "==", uid), orderBy("data", "desc"), limit(5));
            const snap = await getDocs(q);
            const container = document.getElementById('historico-atividades');
            
            if (snap.empty) {
                container.innerHTML = `<p style="color:var(--text-soft); font-size:0.8rem; text-align:center;">Sem atividades recentes.</p>`;
                return;
            }

            container.innerHTML = "";
            snap.forEach(doc => {
                const act = doc.data();
                const icon = act.tipo === 'Rendimento' ? 'fa-chart-line' : (act.valor < 0 ? 'fa-arrow-up' : 'fa-arrow-down');
                const color = act.valor > 0 ? 'var(--success)' : '#ef4444';

                container.innerHTML += `
                    <div class="activity-item">
                        <div class="activity-icon"><i class="fas ${icon}"></i></div>
                        <div class="activity-content">
                            <h5>${act.tipo}</h5>
                            <p>${act.descricao}</p>
                            <small style="color:${color}; font-weight:bold;">${act.valor > 0 ? '+' : ''} R$ ${Math.abs(act.valor).toFixed(2)}</small>
                        </div>
                    </div>
                `;
            });
        }

        // Lógica Visual do Check-in
        window.coletarBonusDiario = () => {
            Swal.fire({
                title: 'Check-in Realizado!',
                text: 'Você recebeu seu bônus diário. Volte amanhã!',
                icon: 'success',
                background: '#111827',
                color: '#fff',
                confirmButtonColor: '#5b8cff'
            });
            document.getElementById('checkin-streak').innerText = "1";
        };

    </script>
</body>
</html>
