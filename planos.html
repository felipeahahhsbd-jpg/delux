<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investimentos - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-main: #0b0f1a;
            --bg-card: #121826;
            --primary: #4f8cff;
            --secondary: #7cf3ff;
            --accent: #9b8cff;
            --success: #22c55e;
            --gold: #ffd166;
            --text: #ffffff;
            --text-soft: #9aa4b2;
            --radius: 20px;
        }

        /* RESET & BASE */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: linear-gradient(180deg, var(--bg-main), #05070f); 
            color: var(--text); 
            padding-bottom: 110px; 
            min-height: 100vh; 
        }

        /* ANIMAÇÕES */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER PREMIUM */
        .header { 
            background: rgba(18, 24, 38, 0.6);
            backdrop-filter: blur(15px);
            text-align: center; 
            padding: 30px 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0 0 30px 30px;
            margin-bottom: 25px; 
            animation: fadeIn 0.6s ease-out;
        }
        .header h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
        .header h2 span { 
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 0.9rem; color: var(--text-soft); margin-top: 8px; font-weight: 500; }

        /* CARD DE SALDO */
        .balance-container { padding: 0 20px; }
        .balance-card {
            background: linear-gradient(135deg, rgba(79, 140, 255, 0.1), rgba(155, 140, 255, 0.05));
            border-radius: var(--radius); 
            padding: 25px 20px;
            text-align: center; 
            margin-bottom: 30px; 
            border: 1px solid rgba(79, 140, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(79, 140, 255, 0.1);
            animation: slideUp 0.6s ease-out;
        }
        .balance-card small { color: var(--primary); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .balance-card div { font-size: 2.2rem; font-weight: 900; color: var(--text); margin-top: 8px; text-shadow: 0 0 15px rgba(79, 140, 255, 0.4); letter-spacing: -1px; }

        /* LISTA DE PLANOS */
        .plans-list { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            padding: 0 20px;
        }

        /* PLAN CARDS */
        .plan-card {
            background: var(--bg-card); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; 
            padding: 35px 25px 25px; 
            display: flex; flex-direction: column; align-items: center; text-align: center; 
            position: relative; overflow: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.8s ease-out backwards;
        }
        .plan-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(79, 140, 255, 0.15);
            border-color: rgba(79, 140, 255, 0.3);
        }

        /* TAG DURAÇÃO */
        .duration-tag {
            position: absolute; top: 0; right: 0; 
            background: linear-gradient(135deg, var(--primary), var(--accent));
            font-size: 0.7rem; font-weight: 800; padding: 8px 20px;
            border-bottom-left-radius: 20px; text-transform: uppercase;
            box-shadow: -5px 5px 15px rgba(79, 140, 255, 0.2);
            color: #fff;
        }

        /* TÍTULO & VALOR DO PLANO */
        .plan-card h3 { 
            font-size: 1rem; color: var(--text); margin-bottom: 5px; 
            letter-spacing: 1px; font-weight: 800; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .plan-card h3 i { color: var(--primary); text-shadow: 0 0 10px rgba(79, 140, 255, 0.5); }
        .min-invest { font-size: 0.7rem; color: var(--text-soft); text-transform: uppercase; margin-bottom: 15px; font-weight: 600; }
        .plan-card .price { font-size: 3rem; font-weight: 900; color: #fff; margin-bottom: 25px; letter-spacing: -1.5px; }

        /* GRID DE INFORMAÇÕES */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 15px; margin-bottom: 25px; }
        .info-item { 
            background: #0f172a; 
            padding: 15px 10px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.03); 
            transition: 0.3s;
        }
        .plan-card:hover .info-item { border-color: rgba(255,255,255,0.1); }
        .info-item span { font-size: 0.65rem; color: var(--text-soft); text-transform: uppercase; font-weight: 600; display: block; margin-bottom: 6px; }
        .info-item strong { font-size: 1.1rem; color: #fff; font-weight: 800; }

        /* RETORNO TOTAL */
        .total-box { 
            width: 100%; 
            background: rgba(34, 197, 94, 0.08); 
            border: 1px solid rgba(34, 197, 94, 0.2); 
            padding: 18px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            transition: 0.3s;
        }
        .total-box span { font-size: 0.7rem; color: var(--success); text-transform: uppercase; font-weight: 800; display: block; letter-spacing: 0.5px; }
        .total-box strong { font-size: 1.4rem; color: var(--success); display: block; margin-top: 4px; font-weight: 900; }

        /* BOTÕES */
        .btn-buy { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; border: none; padding: 18px; border-radius: 16px; 
            font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; 
            text-transform: uppercase; letter-spacing: 1px; 
            box-shadow: 0 8px 20px rgba(79, 140, 255, 0.25); 
            transition: 0.3s all cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-buy:not(.btn-disabled):hover {
            transform: scale(1.03);
            box-shadow: 0 12px 25px rgba(79, 140, 255, 0.4);
        }
        .btn-disabled { 
            background: #2a3143 !important; 
            color: var(--text-soft) !important; 
            cursor: not-allowed !important; 
            box-shadow: none !important; 
        }

        /* NAV BOTTOM PREMIUM */
        .nav-bottom { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(18, 24, 38, 0.85); 
            display: flex; justify-content: space-around; padding: 10px 15px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(15px);
            z-index: 10000; height: 85px; align-items: center;
        }
        .nav-item { 
            color: var(--text-soft); text-align: center; text-decoration: none; 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            gap: 6px; padding: 10px 0; border-radius: 16px; transition: 0.3s; margin: 0 5px;
            font-weight: 600;
        }
        .nav-item i { font-size: 1.3rem; transition: 0.3s; }
        .nav-item span { font-size: 0.7rem; }

        /* ITEM ATIVO: AZUL GLOW */
        .nav-item.active { 
            color: #fff; 
            background: rgba(79, 140, 255, 0.15); 
            border: 1px solid rgba(79, 140, 255, 0.3);
            box-shadow: 0 0 20px rgba(79, 140, 255, 0.15);
        }
        .nav-item.active i { color: var(--primary); transform: scale(1.1); text-shadow: 0 0 10px rgba(79, 140, 255, 0.4); }

    </style>
</head>
<body>

    <div class="header">
        <h2><span>Nexus</span>Invest</h2>
        <p>Potencialize seus resultados com nossos planos.</p>
    </div>

    <div class="balance-container">
        <div class="balance-card">
            <small>Saldo Disponível para Aporte</small>
            <div id="user-balance">R$ 0,00</div>
        </div>
    </div>

    <div id="container-planos" class="plans-list"></div>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="planos.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span>Planos</span></a>
        <a href="indicacao.html" class="nav-item"><i class="fas fa-share-alt"></i><span>Indicar</span></a>
        <a href="perfil.html" class="nav-item"><i class="fas fa-user-alt"></i><span>Perfil</span></a>
    </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, Timestamp, increment, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
        authDomain: "monety-site-9175f.firebaseapp.com",
        projectId: "monety-site-9175f",
        storageBucket: "monety-site-9175f.firebasestorage.app",
        messagingSenderId: "840821848803",
        appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let saldoAtual = 0;
    let uidUsuario = null;

    const listaPlanos = [
        { nome: 'MINI', valor: 30, dias: 60, diario: 6, total: 360, ativo: true },
        { nome: 'BRONZE', valor: 50, dias: 30, diario: 10, total: 300, ativo: true },
        { nome: 'START', valor: 100, dias: 30, diario: 20, total: 600, ativo: true },
        { nome: 'PRATA', valor: 200, dias: 30, diario: 40, total: 1200, ativo: true },
        { nome: 'SPEED', valor: 350, dias: 30, diario: 70, total: 2100, ativo: true },
        { nome: 'OURO', valor: 450, dias: 30, diario: 90, total: 2700, ativo: true },
        { nome: 'ADVANCED', valor: 500, dias: 30, diario: 100, total: 3000, ativo: true },
        { nome: 'VITALITY', valor: 700, dias: 30, diario: 140, total: 4200, ativo: true },
        { nome: 'PREMIUM', valor: 1000, dias: 30, diario: 200, total: 6000, ativo: true },
        { nome: 'VIP', valor: 2000, dias: 30, diario: 400, total: 12000, ativo: true },
        { nome: 'ELITE', valor: 3000, dias: 30, diario: 0, total: 0, ativo: false },
        { nome: 'ULTIMATE', valor: 5000, dias: 30, diario: 0, total: 0, ativo: false }
    ];

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            uidUsuario = user.uid;
            await carregarDados();
            await verificarRendimentos();
            gerarPlanos();
        } else { window.location.href = "login.html"; }
    });

    async function carregarDados() {
        try {
            const snap = await getDoc(doc(db, "usuarios", uidUsuario));
            if (snap.exists()) {
                const dados = snap.data();
                saldoAtual = Number(dados.saldo || dados.balance) || 0;
                document.getElementById('user-balance').innerText = `R$ ${saldoAtual.toFixed(2).replace('.', ',')}`;
            }
        } catch (e) { console.error("Erro ao carregar saldo:", e); }
    }

    async function verificarRendimentos() {
        try {
            const q = query(collection(db, "investimentos"), 
                where("userId", "==", uidUsuario),
                where("status", "==", "ativo")
            );
            
            const snapshot = await getDocs(q);
            const agora = new Date();

            for (const docInv of snapshot.docs) {
                const dadosInv = docInv.data();
                if (!dadosInv.ultimoPagamento) continue;

                const ultimoPag = dadosInv.ultimoPagamento.toDate();
                const dataExp = dadosInv.dataExpiracao.toDate();

                if (agora > dataExp) {
                    await updateDoc(doc(db, "investimentos", docInv.id), { status: "finalizado" });
                    continue;
                }

                const diffTime = Math.abs(agora - ultimoPag);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays >= 1) {
                    const valorPagar = dadosInv.rendimentoDiario * diffDays;
                    await updateDoc(doc(db, "usuarios", uidUsuario), {
                        saldoLucro: increment(valorPagar),
                        totalEarned: increment(valorPagar)
                    });

                    await updateDoc(doc(db, "investimentos", docInv.id), {
                        ultimoPagamento: Timestamp.now()
                    });

                    await addDoc(collection(db, "historico"), {
                        userId: uidUsuario,
                        valor: valorPagar,
                        tipo: "Rendimento",
                        descricao: `Rendimento ${diffDays} dia(s) - Plano ${dadosInv.plano}`,
                        data: Timestamp.now()
                    });
                }
            }
        } catch (error) { console.error("Erro nos rendimentos:", error); }
    }

    function gerarPlanos() {
        const container = document.getElementById('container-planos');
        container.innerHTML = listaPlanos.map((p, index) => {
            const isVip = p.valor >= 1000;
            const icon = isVip ? '<i class="fas fa-crown" style="color: var(--gold);"></i>' : '<i class="fas fa-bolt"></i>';
            
            return `
            <div class="plan-card" style="animation-delay: ${index * 0.1}s">
                <div class="duration-tag">Ciclo: ${p.dias} Dias</div>
                <h3>${icon} PLANO ${p.nome}</h3>
                <p class="min-invest">Aporte Único</p>
                <div class="price">R$ ${p.valor.toFixed(2).replace('.', ',')}</div>
                <div class="info-grid">
                    <div class="info-item">
                        <span>Diário</span>
                        <strong>R$ ${p.diario.toFixed(2).replace('.', ',')}</strong>
                    </div>
                    <div class="info-item">
                        <span>Duração</span>
                        <strong style="color:var(--secondary)">${p.dias} dias</strong>
                    </div>
                </div>
                <div class="total-box">
                    <span>Retorno Total Estimado</span>
                    <strong>R$ ${p.total.toFixed(2).replace('.', ',')}</strong>
                </div>
                <button class="${p.ativo ? 'btn-buy' : 'btn-buy btn-disabled'}" 
                    onclick="${p.ativo ? `comprarPlano('${p.nome}', ${p.valor}, ${p.diario}, ${p.dias})` : ''}">
                    ${p.ativo ? 'Ativar Agora' : 'Em Breve'}
                </button>
            </div>`
        }).join('');
    }

    async function processarComissoesRede(valorPlano) {
        try {
            const compradorSnap = await getDoc(doc(db, "usuarios", uidUsuario));
            if (!compradorSnap.exists()) return;
            
            const dados = compradorSnap.data();
            if (dados.jaGerouBonus === true) return;

            const rede = [
                { id: dados.indicadoPor, pct: 0.10 },      
                { id: dados.indicadoPorAvo, pct: 0.05 },  
                { id: dados.indicadoPorBisavo, pct: 0.02 } 
            ];

            for (let i = 0; i < rede.length; i++) {
                const indicanteId = rede[i].id;
                if (indicanteId && indicanteId.trim() !== "") {
                    let porcentagem = rede[i].pct;
                    
                    if (i === 0) { 
                        const paiSnap = await getDoc(doc(db, "usuarios", indicanteId));
                        if (paiSnap.exists()) {
                            const count = paiSnap.data().indicadosCount || 0;
                            if (count >= 50) porcentagem = 0.20;
                            else if (count >= 10) porcentagem = 0.15;
                        }
                    }

                    const bonus = valorPlano * porcentagem;
                    await updateDoc(doc(db, "usuarios", indicanteId), {
                        saldoLucro: increment(bonus),
                        totalComissoes: increment(bonus)
                    });

                    await addDoc(collection(db, "historico"), {
                        userId: indicanteId,
                        valor: bonus,
                        tipo: "Indicação",
                        descricao: `Comissão Nível ${i+1} - Referente a ${dados.nome || 'Novo Membro'}`,
                        data: Timestamp.now()
                    });
                }
            }
            await updateDoc(doc(db, "usuarios", uidUsuario), { jaGerouBonus: true });
        } catch (e) { console.error("Erro no processamento de rede:", e); }
    }

    window.comprarPlano = async (nome, valor, diario, dias) => {
        try {
            await carregarDados();

            if (saldoAtual < valor) {
                return Swal.fire({ 
                    icon: 'error', 
                    title: 'Saldo insuficiente', 
                    text: 'Você precisa de saldo de depósito para ativar planos.',
                    background: '#121826', color: '#ffffff',
                    confirmButtonColor: '#4f8cff'
                });
            }

            const confirm = await Swal.fire({
                title: 'Confirmar Ativação?',
                text: `Deseja ativar o plano ${nome} por R$ ${valor.toFixed(2).replace('.', ',')}?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#4f8cff',
                cancelButtonColor: '#2a3143',
                confirmButtonText: 'Sim, Ativar!',
                cancelButtonText: 'Cancelar',
                background: '#121826', color: '#ffffff'
            });

            if (confirm.isConfirmed) {
                Swal.fire({ 
                    title: 'Processando...', 
                    allowOutsideClick: false, 
                    didOpen: () => Swal.showLoading(), 
                    background: '#121826', color: '#ffffff' 
                });

                const dataExp = new Date();
                dataExp.setDate(dataExp.getDate() + dias);

                await addDoc(collection(db, "investimentos"), {
                    userId: uidUsuario,
                    plano: nome,
                    valor: valor,
                    rendimentoDiario: diario,
                    status: "ativo",
                    timestamp: Timestamp.now(),
                    dataExpiracao: Timestamp.fromDate(dataExp),
                    ultimoPagamento: Timestamp.now()
                });

                const userRef = doc(db, "usuarios", uidUsuario);
                const userSnap = await getDoc(userRef);
                const campoSaldo = userSnap.data().balance !== undefined ? "balance" : "saldo";

                await updateDoc(userRef, { 
                    [campoSaldo]: increment(-valor) 
                });

                await addDoc(collection(db, "historico"), {
                    userId: uidUsuario,
                    valor: -valor, 
                    tipo: "Plano Ativado", 
                    descricao: `Ativação do Plano ${nome}`,
                    data: Timestamp.now()
                });

                try {
                    await processarComissoesRede(valor);
                } catch (errRede) {
                    console.error("Erro ao pagar comissões, mas o plano foi ativado:", errRede);
                }

                await Swal.fire({ 
                    icon: 'success', 
                    title: 'Plano Ativado!', 
                    text: 'Seu rendimento começará em 24h.', 
                    timer: 2000, 
                    showConfirmButton: false, 
                    background: '#121826', color: '#ffffff' 
                });

                window.location.href = "home.html";
            }
        } catch (e) {
            console.error("ERRO DETALHADO NA ATIVAÇÃO:", e);
            Swal.fire({ 
                icon: 'error', 
                title: 'Falha na Ativação', 
                text: 'Houve um erro técnico. Verifique seu saldo e tente novamente.', 
                background: '#121826', color: '#ffffff',
                confirmButtonColor: '#4f8cff'
            });
        }
    };
</script>
</body>
</html>
